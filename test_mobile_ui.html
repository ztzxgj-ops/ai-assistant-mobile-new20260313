<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动端UI测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
        }
        
        .test-info {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .test-info h1 {
            color: #1a1a1a;
            margin-bottom: 16px;
            font-size: 24px;
        }
        
        .test-item {
            padding: 12px;
            margin: 8px 0;
            background: #f8f8f8;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .test-item.pass {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }
        
        .test-item.fail {
            border-left-color: #f44336;
            background: #ffebee;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 0;
            width: 100%;
        }
        
        .btn:active {
            background: #5568d3;
        }
        
        .log-area {
            background: #1a1a1a;
            color: #00ff00;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 16px;
        }
        
        .log-line {
            margin: 4px 0;
        }
        
        .info {
            padding: 12px;
            background: #e3f2fd;
            border-radius: 8px;
            margin: 8px 0;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="test-info">
        <h1>📱 移动端UI测试</h1>
        
        <div class="info">
            <strong>测试说明：</strong><br>
            1. 在手机浏览器中打开此页面<br>
            2. 点击下方测试按钮<br>
            3. 观察测试结果和日志信息
        </div>
        
        <h3 style="margin-top: 20px;">检测结果：</h3>
        <div id="test-results"></div>
        
        <button class="btn" onclick="runTests()">🧪 运行测试</button>
        <button class="btn" onclick="openMainApp()" style="background: #4caf50;">🚀 打开主应用</button>
        
        <h3 style="margin-top: 20px;">调试日志：</h3>
        <div class="log-area" id="log-area"></div>
    </div>
    
    <script>
        let logs = [];
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            logs.push(logMessage);
            
            const logArea = document.getElementById('log-area');
            const logLine = document.createElement('div');
            logLine.className = 'log-line';
            logLine.textContent = logMessage;
            logArea.appendChild(logLine);
            logArea.scrollTop = logArea.scrollHeight;
            
            console.log(logMessage);
        }
        
        function addTestResult(name, passed, details) {
            const resultsDiv = document.getElementById('test-results');
            const testItem = document.createElement('div');
            testItem.className = `test-item ${passed ? 'pass' : 'fail'}`;
            testItem.innerHTML = `
                <strong>${passed ? '✅' : '❌'} ${name}</strong>
                ${details ? `<div style="font-size: 14px; color: #666; margin-top: 4px;">${details}</div>` : ''}
            `;
            resultsDiv.appendChild(testItem);
        }
        
        function runTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';
            logs = [];
            document.getElementById('log-area').innerHTML = '';
            
            log('开始运行移动端UI测试...');
            
            // 测试1：检测屏幕宽度
            const screenWidth = window.innerWidth;
            log(`屏幕宽度: ${screenWidth}px`);
            const isMobile = screenWidth <= 768;
            addTestResult(
                '移动端检测',
                isMobile,
                `屏幕宽度: ${screenWidth}px ${isMobile ? '(移动端)' : '(桌面端)'}`
            );
            
            // 测试2：检测viewport设置
            const viewport = document.querySelector('meta[name="viewport"]');
            const hasViewport = viewport !== null;
            log(`Viewport设置: ${hasViewport ? viewport.content : '未设置'}`);
            addTestResult(
                'Viewport配置',
                hasViewport,
                hasViewport ? viewport.content : '未找到viewport meta标签'
            );
            
            // 测试3：检测触摸支持
            const hasTouch = 'ontouchstart' in window;
            log(`触摸支持: ${hasTouch ? '是' : '否'}`);
            addTestResult(
                '触摸支持',
                hasTouch,
                hasTouch ? '设备支持触摸操作' : '设备不支持触摸操作'
            );
            
            // 测试4：检测UserAgent
            const ua = navigator.userAgent;
            const isMobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
            log(`UserAgent: ${ua.substring(0, 50)}...`);
            log(`移动设备UA: ${isMobileUA ? '是' : '否'}`);
            addTestResult(
                'UserAgent检测',
                isMobileUA,
                isMobileUA ? '识别为移动设备' : '识别为桌面设备'
            );
            
            // 测试5：检测设备像素比
            const dpr = window.devicePixelRatio || 1;
            log(`设备像素比: ${dpr}`);
            addTestResult(
                '设备像素比',
                dpr >= 1,
                `像素比: ${dpr}x (${dpr >= 2 ? '高清屏' : '标准屏'})`
            );
            
            // 测试6：测试localStorage
            try {
                localStorage.setItem('test', 'value');
                const testValue = localStorage.getItem('test');
                localStorage.removeItem('test');
                log('LocalStorage: 可用');
                addTestResult(
                    'LocalStorage支持',
                    true,
                    '存储功能正常'
                );
            } catch (e) {
                log(`LocalStorage: 不可用 - ${e.message}`);
                addTestResult(
                    'LocalStorage支持',
                    false,
                    `错误: ${e.message}`
                );
            }
            
            // 测试7：测试CSS媒体查询
            const mediaQuery = window.matchMedia('(max-width: 768px)');
            const matchesMobile = mediaQuery.matches;
            log(`CSS媒体查询(max-width: 768px): ${matchesMobile ? '匹配' : '不匹配'}`);
            addTestResult(
                'CSS媒体查询',
                matchesMobile === isMobile,
                `查询结果与屏幕宽度${matchesMobile === isMobile ? '一致' : '不一致'}`
            );
            
            // 测试8：检测网络连接
            const isOnline = navigator.onLine;
            log(`网络连接: ${isOnline ? '在线' : '离线'}`);
            addTestResult(
                '网络连接',
                isOnline,
                isOnline ? '网络连接正常' : '无网络连接'
            );
            
            log('测试完成！');
            
            // 生成测试报告摘要
            const testItems = document.querySelectorAll('.test-item');
            const passCount = document.querySelectorAll('.test-item.pass').length;
            const totalCount = testItems.length;
            
            log('');
            log('=== 测试摘要 ===');
            log(`通过: ${passCount}/${totalCount}`);
            log(`失败: ${totalCount - passCount}/${totalCount}`);
            log(`成功率: ${(passCount / totalCount * 100).toFixed(1)}%`);
        }
        
        function openMainApp() {
            log('正在打开主应用...');
            window.location.href = '/';
        }
        
        // 页面加载时自动运行测试
        window.addEventListener('DOMContentLoaded', () => {
            log('页面加载完成');
            log('点击"运行测试"按钮开始测试');
        });
    </script>
</body>
</html>
