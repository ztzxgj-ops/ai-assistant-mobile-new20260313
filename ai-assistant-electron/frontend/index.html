<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>
    <link rel="stylesheet" href="css/mobile_ui_v5.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #34495e;
            border-bottom: 1px solid #465669;
        }

        .sidebar-header h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.7;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }

        .nav-item:hover {
            background: #34495e;
        }

        .nav-item.active {
            background: #34495e;
            border-left-color: #3498db;
        }

        .sidebar-footer {
            padding: 15px;
            background: #1a252f;
            text-align: center;
        }

        .sidebar-footer button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ecf0f1;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-bottom: 1px solid #d1d5db;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            color: #2c3e50;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #3498db;
            color: white;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #2c3e50;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        /* 输入区域 */
        .input-area {
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #d1d5db;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            font-size: 14px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #3498db;
        }

        .input-area button {
            padding: 10px 25px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .input-area button:hover {
            background: #2980b9;
        }

        .input-area button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        /* 加载动画 */
        .typing-indicator {
            display: none;
            padding: 10px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #95a5a6;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>AI Personal Assistant</h2>
            <p id="user-name">加载中...</p>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-view="chat">💬 聊天</div>
            <div class="nav-item" data-view="plans">📋 工作计划</div>
            <div class="nav-item" data-view="reminders">⏰ 提醒事项</div>
            <div class="nav-item" data-view="files">📁 文件管理</div>
            <div class="nav-item" data-view="settings">⚙️ 设置</div>
        </div>
        <div class="sidebar-footer">
            <button onclick="logout()">退出登录</button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="header">
            <h1 id="view-title">智能助手</h1>
        </div>

        <!-- 聊天视图 -->
        <div id="chat-view">
            <div class="chat-container" id="chat-messages">
                <div class="message assistant">
                    <div class="message-bubble">
                        <div>你好！我是你的AI助手，有什么可以帮你的吗？</div>
                        <div class="message-time">现在</div>
                    </div>
                </div>
            </div>
            <div class="typing-indicator" id="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="input-area">
                <textarea id="message-input" placeholder="输入消息..." rows="1" autofocus></textarea>
                <button id="send-button" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script>
        // 检查登录状态
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // 显示用户名
        document.getElementById('user-name').textContent = localStorage.getItem('username') || '用户';

        // 导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const view = item.dataset.view;
                document.getElementById('view-title').textContent = item.textContent.trim();
                // TODO: 切换不同视图
            });
        });

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();

            if (!message) return;

            // 添加用户消息到界面
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            // 显示加载动画
            document.getElementById('typing-indicator').style.display = 'block';
            document.getElementById('send-button').disabled = true;

            try {
                const result = await window.electronAPI.chat(message);

                // 隐藏加载动画
                document.getElementById('typing-indicator').style.display = 'none';
                document.getElementById('send-button').disabled = false;

                if (result.success) {
                    const response = result.data.response || result.data.message || '抱歉，我没有理解你的意思';
                    addMessage('assistant', response);
                } else {
                    addMessage('assistant', '抱歉，出现了错误：' + (result.error || '未知错误'));
                }
            } catch (error) {
                document.getElementById('typing-indicator').style.display = 'none';
                document.getElementById('send-button').disabled = false;
                addMessage('assistant', '抱歉，发送消息失败：' + error.message);
            }
        }

        // 添加消息到聊天区
        function addMessage(role, content) {
            const chatContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            const contentDiv = document.createElement('div');
            contentDiv.textContent = content;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});

            bubble.appendChild(contentDiv);
            bubble.appendChild(timeDiv);
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);

            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 输入框自动高度和回车发送
        const messageInput = document.getElementById('message-input');
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            // 限制最大高度约4行 (每行约24px)
            const newHeight = Math.min(this.scrollHeight, 96); 
            this.style.height = newHeight + 'px';
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 加载历史消息
        async function loadHistory() {
            try {
                const result = await window.electronAPI.getChatHistory();
                if (result.success && result.data.messages) {
                    const chatContainer = document.getElementById('chat-messages');
                    chatContainer.innerHTML = ''; // 清空欢迎消息

                    result.data.messages.forEach(msg => {
                        addMessage(msg.role, msg.content);
                    });
                }
            } catch (error) {
                console.error('加载历史消息失败：', error);
            }
        }

        // 初始化
        loadHistory();
    </script>
</body>
</html>
