# Nginx配置文件 - AI助理系统路径部署
# 部署方式：http://47.109.148.176/ai/

server {
    listen 80;
    server_name 47.109.148.176;  # 替换为您的域名或IP

    # 设置日志
    access_log /var/log/nginx/ai-assistant-access.log;
    error_log /var/log/nginx/ai-assistant-error.log;

    # 智能鱼缸系统（根路径，保持原有配置）
    location / {
        root /var/www/fish-tank;  # 请确认实际路径
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # AI助理系统（/ai/ 路径）
    location /ai/ {
        # 重要：使用尾部斜杠确保路径正确转发
        proxy_pass http://127.0.0.1:8000/;

        # 基础代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket支持（如果需要实时功能）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # AI助理静态文件（头像、图片等）
    location /ai/uploads/ {
        alias /var/www/ai-assistant/uploads/;
        expires 7d;
        add_header Cache-Control "public";

        # 安全设置
        autoindex off;
    }

    # 文件上传大小限制
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;
}

