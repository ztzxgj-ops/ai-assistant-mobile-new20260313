<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - AI Personal Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 400px;
            max-width: 90%;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-with-button {
            display: flex;
            gap: 10px;
        }

        .input-with-button input {
            flex: 1;
        }

        .input-with-button button {
            width: 120px;
            padding: 12px;
            margin: 0;
            font-size: 13px;
            white-space: nowrap;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .input-with-button button:hover:not(:disabled) {
            opacity: 0.9;
        }

        .input-with-button button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }

        .step-indicator {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>找回密码</h1>
        <div class="subtitle">请按照以下步骤重置您的密码</div>

        <div id="resetForm">
            <!-- 步骤1: 选择找回方式 -->
            <div class="form-group">
                <label for="contact-type">选择找回方式</label>
                <select id="contact-type" onchange="updateContactLabel()">
                    <option value="email">邮箱找回</option>
                    <option value="phone">手机找回（暂不支持）</option>
                </select>
                <div class="info-text">选择您注册时使用的联系方式</div>
            </div>

            <!-- 步骤2: 输入联系方式 -->
            <div class="form-group">
                <label for="contact-value" id="contact-label">邮箱地址</label>
                <div class="input-with-button">
                    <input type="text" id="contact-value" placeholder="请输入您的邮箱地址">
                    <button type="button" id="send-reset-code" onclick="sendResetCode()">
                        发送验证码
                    </button>
                </div>
            </div>

            <!-- 步骤3: 输入验证码 -->
            <div class="form-group">
                <label for="reset-code">验证码</label>
                <input type="text" id="reset-code" placeholder="请输入6位验证码" maxlength="6">
                <div class="info-text">验证码已发送至您的邮箱，有效期10分钟</div>
            </div>

            <!-- 步骤4: 输入新密码 -->
            <div class="form-group">
                <label for="new-password">新密码</label>
                <input type="password" id="new-password" placeholder="请输入新密码（至少6位）">
                <div class="info-text">请设置一个安全的密码</div>
            </div>

            <!-- 重置按钮 -->
            <button onclick="handleResetPassword()">重置密码</button>

            <!-- 错误和成功消息 -->
            <div class="error-message" id="reset-error"></div>
            <div class="success-message" id="reset-success"></div>

            <!-- 底部链接 -->
            <div class="footer">
                <a href="login.html">← 返回登录</a>
            </div>
        </div>
    </div>

    <script>
        // 倒计时计时器
        let countdownTimer = null;

        function updateContactLabel() {
            const contactType = document.getElementById('contact-type').value;
            const contactLabel = document.getElementById('contact-label');
            const contactValue = document.getElementById('contact-value');
            const phoneButton = document.getElementById('send-reset-code');

            if (contactType === 'email') {
                contactLabel.textContent = '邮箱地址';
                contactValue.placeholder = '请输入您的邮箱地址';
                phoneButton.disabled = false;
                phoneButton.style.opacity = '1';
                phoneButton.style.cursor = 'pointer';
            } else {
                contactLabel.textContent = '手机号';
                contactValue.placeholder = '请输入您的手机号，如 13800138000';
                phoneButton.disabled = true;
                phoneButton.style.opacity = '0.5';
                phoneButton.style.cursor = 'not-allowed';
            }
        }

        async function sendResetCode() {
            const contactType = document.getElementById('contact-type').value;
            const contactValue = document.getElementById('contact-value').value.trim();
            const errorEl = document.getElementById('reset-error');

            if (!contactValue) {
                errorEl.textContent = '请输入联系方式';
                return;
            }

            // 格式验证
            if (contactType === 'email') {
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contactValue)) {
                    errorEl.textContent = '请输入正确的邮箱地址';
                    return;
                }
            } else {
                if (!/^1[3-9]\d{9}$/.test(contactValue)) {
                    errorEl.textContent = '请输入正确的手机号';
                    return;
                }
            }

            try {
                const result = await window.electronAPI.sendVerificationCode(
                    contactType,
                    contactValue,
                    'reset_password'
                );

                if (result.success && result.data.success) {
                    errorEl.textContent = '';
                    alert(result.data.message);
                    startCountdown('send-reset-code', 60);
                } else {
                    errorEl.textContent = result.data?.message || '发送失败';
                }
            } catch (error) {
                errorEl.textContent = '发送出错：' + error.message;
            }
        }

        function startCountdown(buttonId, seconds) {
            const button = document.getElementById(buttonId);
            button.disabled = true;
            let countdown = seconds;

            countdownTimer = setInterval(() => {
                countdown--;
                button.textContent = `${countdown}秒后重试`;

                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    button.disabled = false;
                    button.textContent = '发送验证码';
                }
            }, 1000);
        }

        async function handleResetPassword() {
            const contactType = document.getElementById('contact-type').value;
            const contactValue = document.getElementById('contact-value').value.trim();
            const code = document.getElementById('reset-code').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const errorEl = document.getElementById('reset-error');
            const successEl = document.getElementById('reset-success');

            // 清除消息
            errorEl.textContent = '';
            successEl.textContent = '';

            // 验证输入
            if (!contactValue || !code || !newPassword) {
                errorEl.textContent = '请填写所有信息';
                return;
            }

            if (newPassword.length < 6) {
                errorEl.textContent = '密码至少需要6位';
                return;
            }

            if (!/^\d{6}$/.test(code)) {
                errorEl.textContent = '验证码必须是6位数字';
                return;
            }

            try {
                const result = await window.electronAPI.resetPassword({
                    contact_type: contactType,
                    contact_value: contactValue,
                    verification_code: code,
                    new_password: newPassword
                });

                if (result.success && result.data.success) {
                    successEl.textContent = result.data.message || '密码重置成功！';

                    // 延迟2秒后跳转回登录页
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorEl.textContent = result.data?.message || '重置失败';
                }
            } catch (error) {
                errorEl.textContent = '重置出错：' + error.message;
            }
        }

        // 回车键提交
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                // 如果焦点在验证码或密码字段，按回车直接重置
                const activeElement = document.activeElement;
                if (activeElement.id === 'reset-code' || activeElement.id === 'new-password') {
                    handleResetPassword();
                }
            }
        });
    </script>
</body>
</html>
